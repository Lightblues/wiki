theme:
  name: "material"
  custom_dir: "theme"
  search:
    language: "en"
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

# google_analytics: ["UA-155100419-1", "auto"]
copyright: "Copyright &copy; 2021-2025 Easonshi"
site_author: Easonshi
site_description: "Personal knowledge base"
site_url: https://lightblues.github.io/wiki
remote_branch: gh-pages
remote_name: origin
docs_dir: docs
site_dir: site

extra:
  social:
    - icon: "fontawesome/brands/github-alt"
      link: "https://github.com/Lightblues"
    - icon: "fontawesome/solid/house"
      link: "https://lightblues.github.io/"
    - icon: "fontawesome/regular/envelope"
      link: "mailto:oldcitystal@gmail.com"

# repo_name: "lightblues/eason_githubio"
# repo_url: "https://github.com/lightblues/eason_githubio"
# edit_uri: edit/main/wiki/docs/

extra_javascript:
  # - js/baidu-tongji.js
  - "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML"

markdown_extensions:
  - attr_list
  - pymdownx.arithmatex
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tilde
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - codehilite
  - smarty
  - sane_lists
  - meta
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      separator: '[\s\-\.]+'
      lang: ja
